name: Update Weather JSON (Retry Safe)

on:
  schedule:
    - cron: "0 * * * *"   # varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Fetch weather data
      run: |
        echo "Hämtar väderdatan..."
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.3293&longitude=18.0686&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto" -o rawweather.json

    - name: Validate file
      run: |
        if [ ! -s rawweather.json ]; then
          echo "FEL: rawweather.json är tom eller saknas!"
          exit 1
        fi

    - name: Build weather.json
      run: |
        node << 'EOF'
        const fs = require("fs");
        const data = JSON.parse(fs.readFileSync("rawweather.json"));

        const icons = {
          0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
          45:"🌫️",48:"🌫️",
          51:"🌦️",53:"🌦️",55:"🌧️",
          61:"🌧️",63:"🌧️",65:"🌧️",
          71:"🌨️",73:"🌨️",75:"❄️",
          80:"🌦️",81:"🌧️",82:"⛈️",
          95:"⛈️",96:"⛈️",99:"⛈️"
        };

        const result = data.daily.time.map((date, i) => {
          const d = new Date(date);
          const weekday = d.toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase();

          return {
            day: weekday,
            max: Math.round(data.daily.temperature_2m_max[i]),
            min: Math.round(data.daily.temperature_2m_min[i]),
            icon: icons[data.daily.weathercode[i]] ?? "❓"
          };
        });

        fs.writeFileSync("weather.json", JSON.stringify(result, null, 2));
        console.log("weather.json skapad!");
        EOF

    - name: Commit and push with retry
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Actions"

        attempts=0
        max_attempts=10

        until [ $attempts -ge $max_attempts ]
        do
          git add weather.json
          git commit -m "Updated weather.json" && git push && break

          attempts=$((attempts+1))
          echo "Push misslyckades pga GitHub Pages build. Försök igen om 30 sekunder... ($attempts/$max_attempts)"
          sleep 30
        done

        if [ $attempts -ge $max_attempts ]; then
          echo "Fel: Kunde inte pusha efter $max_attempts försök."
          exit 1
        fi
