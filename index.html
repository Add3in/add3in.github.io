<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    html, body {
        margin: 0;
        height: 100%;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #1976D2, #42A5F5);
        color: white;
        overflow: hidden; /* Ingen scroll */
    }

    h1 {
        text-align: center;
        font-size: 3.5rem;
        margin: 20px 0 10px;
        font-weight: 300;
    }

    /* Huvudlayouten fyller hela skärmen */
    .container {
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Fördelar ut boxarna jämnt */
        height: calc(100% - 120px); /* Anpassar för titel */
        padding: 0 30px 30px;
        gap: 10px;
        box-sizing: border-box;
    }

    .day {
        flex: 1; /* Varje dag tar lika mycket plats på höjden */
        display: flex;
        flex-direction: column;
        justify-content: center;

        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(6px);
        border-radius: 16px;
        text-align: center;

        box-shadow: 0 6px 18px rgba(0,0,0,0.25);
        padding: 10px;
        min-height: 90px; /* Skydd mot för små skärmar */
    }

    .date {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 5px;
    }

    .icon {
        font-size: 3.5rem;
    }

    .temp {
        font-size: 1.8rem;
        margin-top: 5px;
        font-weight: 300;
    }

    /* Anpassning vid extremt breda skärmar */
    @media (min-aspect-ratio: 16/9) {
        .date { font-size: 2.2rem; }
        .icon { font-size: 4rem; }
        .temp { font-size: 2rem; }
    }
</style>
</head>

<body>
<h1>Veckans väder</h1>
<div class="container" id="weather"></div>
