<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #1976D2, #42A5F5);
        color: white;
    }

    h1 {
        text-align: center;
        font-size: 3rem;
        margin: 15px 0;
        font-weight: 300;
    }

    .container {
        width: 100%;
        padding: 0 20px 20px;
        box-sizing: border-box;
    }

    .day {
        background: rgba(255,255,255,0.18);
        backdrop-filter: blur(5px);
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .date {
        font-size: 1.8rem;
        font-weight: 600;
    }

    .icon {
        font-size: 3.2rem;
        margin: 5px 0;
    }

    .temp {
        font-size: 1.5rem;
        font-weight: 300;
    }
</style>
</head>

<body>
<h1>Veckans väder</h1>
<div class="container" id="weather"></div>

<script>
// ----- HÖJDANPASSNING FÖR SMARTSIGN -----
function adjustHeights() {
    const availableHeight = window.innerHeight - 120; // minus rubrik
    const dayHeight = availableHeight / 7; // perfekt fördelning

    document.querySelectorAll(".day").forEach(day => {
        day.style.height = dayHeight + "px";
    });
}

// Kör när sidan laddas och varje gång fönstret ändras
window.addEventListener("resize", adjustHeights);


// ---- VÄDERKOD -----
const lat = 59.3293;
const lon = 18.0686;

const icons = {
    0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
    45:"🌫️",48:"🌫️",
    51:"🌦️",53:"🌦️",55:"🌧️",
    61:"🌧️",63:"🌧️",65:"🌧️",
    71:"🌨️",73:"🌨️",75:"❄️",
    80:"🌦️",81:"🌧️",82:"⛈️",
    95:"⛈️",96:"⛈️",99:"⛈️"
};

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("weather");

    data.daily.time.forEach((date, i) => {
      const max = Math.round(data.daily.temperature_2m_max[i]);
      const min = Math.round(data.daily.temperature_2m_min[i]);
      const code = data.daily.weathercode[i];

      const elem = document.createElement("div");
      elem.className = "day";

      elem.innerHTML = `
        <div class="date">${new Date(date).toLocaleDateString("sv-SE", { weekday: "long" }).toUpperCase()}</div>
        <div class="icon">${icons[code]}</div>
        <div class="temp">Max ${max}°C • Min ${min}°C</div>
      `;

      container.appendChild(elem);
    });

    adjustHeights(); // Justera när vädret laddats
  });
</script>

</body>
</html>
