<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<title>Veckans väder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #1e90ff;
      color: white;
  }
  h1 {
      text-align: center;
      font-size: 48px;
      margin-bottom: 20px;
  }
  .day {
      background: rgba(255,255,255,0.25);
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 15px;
      text-align: center;
  }
  .date {
      font-size: 32px;
      font-weight: bold;
  }
  .icon {
      font-size: 60px;
      margin: 10px 0;
  }
  .temp {
      font-size: 26px;
      margin-top: 5px;
  }
</style>
</head>

<body>

<h1>Veckans väder</h1>

<div id="weather"></div>

<script>
const iconMap = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"🌨️",73:"🌨️",75:"❄️",
  80:"🌦️",81:"🌧️",82:"⛈️",
  95:"⛈️",96:"⛈️",99:"⛈️"
};

fetch("weather.json")
  .then(r => r.json())
  .then(days => {
      const container = document.getElementById("weather");

      days.forEach(d => {
          const div = document.createElement("div");
          div.className = "day";

          div.innerHTML = `
              <div class="date">${d.day}</div>
              <div class="icon">${iconMap[d.code] || "❓"}</div>
              <div class="temp">Max ${d.max}°C • Min ${d.min}°C</div>
          `;

          container.appendChild(div);
      });
  })
  .catch(err => console.error("JSON-fel:", err));
</script>

</body>
</html>
