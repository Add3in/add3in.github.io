name: Update Weather JSON (Hourly)

on:
  schedule:
    - cron: "0 * * * *"    # varje hel timme
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Fetch weather data
      run: |
        echo "Hämtar väderdatan..."
        curl -s "https://api.open-meteo.com/v1/forecast?latitude=59.3293&longitude=18.0686&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto" \
        -o rawweather.json

    - name: Validate raw data
      run: |
        if [ ! -s rawweather.json ]; then
          echo "FEL: rawweather.json är tom eller saknas!"
          exit 1
        fi

